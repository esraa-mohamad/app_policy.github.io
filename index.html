<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My GitHub Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      line-height: 1.6;
      padding: 0 20px;
      background-color: #f9f9f9;
    }
    h1, h2, h3 {
      color: #333;
    }
    pre {
      background: #eee;
      padding: 10px;
      overflow-x: auto;
    }
    a {
      color: #0366d6;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<h1>Welcome to My Project</h1>

<div id="readme">
  <!-- README content will load here -->
</div>

<script>
  // جلب README.md بصيغة raw من GitHub
  const username = "esraa-mohamad";
  const repo = "app_policy.github.io";
  const branch = "main";
  const url = `https://raw.githubusercontent.com/${username}/${repo}/${branch}/README.md`;

  fetch(url)
    .then(response => response.text())
    .then(md => {
      // تحويل Markdown بسيط إلى HTML
      const html = md
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
        .replace(/\*(.*)\*/gim, '<em>$1</em>')
        .replace(/\[(.*?)\]\((.*?)\)/gim, "<a href='$2'>$1</a>")
        .replace(/\n$/g, '<br>');

      document.getElementById("readme").innerHTML = html;
    })
    .catch(err => console.log("Error loading README:", err));
</script>

</body>
</html>
